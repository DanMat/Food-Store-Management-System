; PHP sessions live in Redis, shared by both app nodes — so the load balancer
; needs no sticky sessions (any node can serve any request).
session.save_handler = redis
session.save_path = "tcp://redis:6379"

; Opcache for throughput.
opcache.enable = 1
opcache.enable_cli = 0
opcache.validate_timestamps = 1

; Production error handling.
display_errors = Off
log_errors = On
error_log = /dev/stderr
expose_php = Off
